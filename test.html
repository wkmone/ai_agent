<!DOCTYPE html>
<html>
<head>
    <title>AI Agent</title>
</head>
<body>
    <h1>AI Agent</h1>
    <div>
        <button>智能对话</button>
        <button>Agent管理</button>
        <button>模型配置</button>
        <button>任务管理</button>
    </div>
    <div>
        <h2>Agent管理</h2>
        <p>这里是Agent管理页面，包含多个Agent类型：</p>
        <ul>
            <li>SimpleAgent：基础的聊天Agent</li>
            <li>ReActAgent：通过推理和行动解决复杂问题的Agent</li>
            <li>ReflectionAgent：能够对自己的行为进行反思和改进的Agent</li>
            <li>PlanAndSolveAgent：能够制定计划并执行的Agent</li>
            <li>FunctionCallAgent：能够调用外部函数来完成任务的Agent</li>
        </ul>
    </div>
</body>
</html>
