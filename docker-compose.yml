version: '3.8'

services:
  # ==================== 数据库服务 ====================
  postgres:
    image: postgres:15-alpine
    container_name: ai_agent_postgres
    environment:
      POSTGRES_DB: ai_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/migration:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_agent_network
    restart: unless-stopped

  # ==================== 缓存服务 ====================
  redis:
    image: redis:7-alpine
    container_name: ai_agent_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_agent_network
    restart: unless-stopped

  # ==================== 图数据库服务 ====================
  neo4j:
    image: neo4j:5.15-community
    container_name: ai_agent_neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-memory123}
      NEO4J_dbms_memory_pagecache_size: 1G
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_agent_network
    restart: unless-stopped

  # ==================== 消息队列服务 ====================
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: ai_agent_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_agent_network
    restart: unless-stopped

  # ==================== 向量数据库依赖服务 ====================
  etcd:
    container_name: ai_agent_etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ai_agent_network
    restart: unless-stopped

  minio:
    container_name: ai_agent_minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ai_agent_network
    restart: unless-stopped

  # ==================== 向量数据库服务 ====================
  milvus:
    container_name: ai_agent_milvus
    image: milvusdb/milvus:v2.3.3
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - "etcd"
      - "minio"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 90s
    networks:
      - ai_agent_network
    restart: unless-stopped

  milvus-attu:
    container_name: ai_agent_milvus_attu
    image: zilliz/attu:v2.3.5
    environment:
      MILVUS_URL: milvus:19530
    ports:
      - "3000:3000"
    depends_on:
      - "milvus"
    networks:
      - ai_agent_network
    restart: unless-stopped

  # ==================== 后端服务 ====================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai_agent_backend
    environment:
      # 数据库配置
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-memory123}
      
      # API 密钥配置
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      BOCHA_API_KEY: ${BOCHA_API_KEY}
      
      # JVM 参数
      JAVA_OPTS: "-Xms512m -Xmx1g -XX:+UseG1GC"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      milvus:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./backend/logs:/app/logs
    networks:
      - ai_agent_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ==================== 前端服务 ====================
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ai_agent_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ai_agent_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  rabbitmq_data:
  etcd_data:
  minio_data:
  milvus_data:

networks:
  ai_agent_network:
    driver: bridge
